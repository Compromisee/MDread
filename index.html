<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        #markdown-input {
            flex: 1;
            border: none;
            padding: 24px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            background: #f8f9fa;
        }

        #markdown-input::placeholder {
            color: #adb5bd;
        }

        .preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .markdown-body {
            background: white !important;
            padding: 24px;
            border-radius: 8px;
            min-height: 100%;
        }

        .markdown-body img {
            max-width: 100%;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #adb5bd;
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 14px;
            opacity: 0.7;
        }

        #file-input {
            display: none;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .markdown-body > * {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Editor Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-header-title">
                    <span>📝</span>
                    <span>Markdown Editor</span>
                </div>
                <div class="controls">
                    <button class="btn" onclick="uploadFile()">
                        📁 Upload
                    </button>
                    <button class="btn" onclick="clearEditor()">
                        🗑️ Clear
                    </button>
                </div>
            </div>
            <textarea 
                id="markdown-input" 
                placeholder="Type or paste your markdown here...

# Example Heading
This is **bold** and this is *italic*.

- List item 1
- List item 2

```javascript
console.log('Hello World!');
```

[Link](https://example.com)
"
            ></textarea>
            <input type="file" id="file-input" accept=".md,.markdown,.txt" onchange="handleFileUpload(event)">
        </div>

        <!-- Preview Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-header-title">
                    <span>👁️</span>
                    <span>Preview</span>
                </div>
                <div class="controls">
                    <button class="btn" onclick="copyHTML()">
                        📋 Copy HTML
                    </button>
                </div>
            </div>
            <div class="preview-container">
                <div id="preview" class="markdown-body">
                    <div class="empty-state">
                        <div class="empty-state-icon">📄</div>
                        <div class="empty-state-text">No content yet</div>
                        <div class="empty-state-subtext">Start typing or upload a markdown file to see the preview</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('markdown-input');
        const preview = document.getElementById('preview');
        const fileInput = document.getElementById('file-input');

        // Configure marked options
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false,
            sanitize: false,
            smartLists: true,
            smartypants: true,
            highlight: function(code, lang) {
                return code;
            }
        });

        // Update preview on input
        input.addEventListener('input', updatePreview);

        function updatePreview() {
            const markdown = input.value;
            
            if (markdown.trim() === '') {
                preview.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📄</div>
                        <div class="empty-state-text">No content yet</div>
                        <div class="empty-state-subtext">Start typing or upload a markdown file to see the preview</div>
                    </div>
                `;
            } else {
                preview.innerHTML = marked.parse(markdown);
            }
        }

        function uploadFile() {
            fileInput.click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    input.value = e.target.result;
                    updatePreview();
                };
                reader.readAsText(file);
            }
        }

        function clearEditor() {
            if (input.value.trim() !== '') {
                if (confirm('Are you sure you want to clear the editor?')) {
                    input.value = '';
                    updatePreview();
                }
            }
        }

        function copyHTML() {
            const html = preview.innerHTML;
            
            if (html.includes('empty-state')) {
                alert('Nothing to copy! Please add some markdown content first.');
                return;
            }

            navigator.clipboard.writeText(html).then(() => {
                // Visual feedback
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                btn.style.background = 'rgba(76, 175, 80, 0.3)';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                }, 2000);
            }).catch(err => {
                alert('Failed to copy HTML. Please try again.');
                console.error('Copy failed:', err);
            });
        }

        // Handle drag and drop
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt'))) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    input.value = event.target.result;
                    updatePreview();
                };
                reader.readAsText(file);
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + K to clear
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                clearEditor();
            }
        });

        // Initial update
        updatePreview();
    </script>
</body>
</html>
